<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeMatch — Find the right MCPs, skills & agents for your project</title>
  <meta name="description" content="Describe your project idea and get matched with the best MCPs, Claude skills, and AI agents.">
  <meta property="og:title" content="VibeMatch">
  <meta property="og:description" content="Describe your project idea and get matched with the best MCPs, skills & agents.">
  <meta property="og:url" content="https://vibe-match-nine.vercel.app/">
  <meta name="twitter:card" content="summary">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1 class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">VibeMatch</span>
      </h1>
      <p class="tagline">Describe your project. Get the right MCPs, skills & agents.</p>
    </header>

    <!-- Search -->
    <form class="search-form" id="searchForm" role="search" aria-label="Search AI tools">
      <div class="search-box">
        <div class="search-input-wrapper">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.3-4.3"/>
          </svg>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="e.g. Build a CLI that reads GitHub issues and posts summaries to Slack"
            autocomplete="off"
            required
            aria-label="Project description"
          />
          <button type="button" class="search-clear" id="searchClear" hidden aria-label="Clear search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
        <button type="submit" class="search-btn" id="searchBtn" aria-label="Find tools">
          <span class="btn-text">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="m5 12 5 5L20 7"/>
            </svg>
            Find Tools
          </span>
          <span class="btn-loading" hidden>
            <span class="spinner"></span> Analyzing...
          </span>
        </button>
      </div>
    </form>

    <!-- Skeleton Loading -->
    <div id="skeletonLoading" class="skeleton-loading" hidden aria-hidden="true">
      <div class="skeleton-reasoning">
        <div class="skeleton-line skeleton-line--title"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line skeleton-line--short"></div>
      </div>
      <div class="skeleton-tabs">
        <div class="skeleton-tab"></div>
        <div class="skeleton-tab"></div>
        <div class="skeleton-tab"></div>
      </div>
      <div class="skeleton-cards">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </div>

    <!-- Results -->
    <main id="results" class="results" hidden>
      <!-- Claude's reasoning -->
      <section id="reasoning" class="reasoning" hidden aria-label="AI analysis">
        <div class="reasoning-header">
          <span class="reasoning-icon">🧠</span>
          <h2>What your project needs</h2>
        </div>
        <div id="reasoningContent" class="reasoning-body"></div>
      </section>

      <!-- Tab Navigation -->
      <nav id="resultTabs" class="result-tabs" hidden aria-label="Filter results by type">
        <button class="tab-btn tab-btn--all active" data-tab="all" aria-pressed="true">
          All
          <span class="tab-count" id="tabCountAll">0</span>
        </button>
        <button class="tab-btn tab-btn--mcp" data-tab="mcp" aria-pressed="false">
          🔌 MCPs
          <span class="tab-count" id="tabCountMcp">0</span>
        </button>
        <button class="tab-btn tab-btn--skill" data-tab="skill" aria-pressed="false">
          🛠 Skills
          <span class="tab-count" id="tabCountSkill">0</span>
        </button>
        <button class="tab-btn tab-btn--agent" data-tab="agent" aria-pressed="false">
          🤖 Agents
          <span class="tab-count" id="tabCountAgent">0</span>
        </button>
      </nav>

      <!-- Cards Grid -->
      <div id="cardsGrid" class="cards"></div>

      <!-- Empty state -->
      <div id="emptyState" class="empty-state" hidden>
        <div class="empty-state-icon">🔍</div>
        <p class="empty-state-title">No matches found</p>
        <p class="empty-state-hint">Try different or broader keywords to discover more tools.</p>
      </div>

      <!-- Error state -->
      <div id="errorState" class="error-state" hidden>
        <div class="error-state-icon">⚠️</div>
        <p class="error-state-title">Something went wrong</p>
        <p class="error-state-msg" id="errorMsg"></p>
        <button class="error-retry-btn" id="errorRetryBtn">Try Again</button>
      </div>
    </main>

    <footer class="footer">
      <p>Built with ⚡ VibeMatch · <a href="https://github.com/ammdevl/vibe-match" target="_blank" rel="noopener">GitHub</a></p>
    </footer>
  </div>

  <!-- Scroll to Top -->
  <button class="scroll-top" id="scrollTop" hidden aria-label="Scroll to top">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
  </button>

  <script src="script.js"></script>
</body>
</html>
